<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>Hand Tracking with MediaPipe</title>
  
  <!-- โหลดไลบรารี MediaPipe ของ Google ผ่าน CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #1e1e1e;
      color: white;
      font-family: sans-serif;
    }
    h2 { margin-top: 20px; }
    .container {
      position: relative;
      width: 640px;
      height: 480px;
      margin-top: 20px;
      border: 2px solid #4CAF50;
      border-radius: 10px;
      overflow: hidden;
    }
    /* ซ่อนวิดีโอต้นฉบับ เราจะวาดทุกอย่างลงบน Canvas แทน */
    .input_video { display: none; }
    .output_canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <h2>Google Apps Script: Hand Tracking</h2>
  
  <div class="container">
    <div class="loading" id="loadingText">กำลังเปิดกล้องและโหลดโมเดล AI...</div>
    <video class="input_video"></video>
    <canvas class="output_canvas" width="640px" height="480px"></canvas>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const loadingText = document.getElementById('loadingText');

    // ฟังก์ชันนี้จะถูกเรียกเมื่อ AI ตรวจจับมือได้
    function onResults(results) {
      // ปิดข้อความโหลดเมื่อภาพเริ่มมา
      loadingText.style.display = 'none'; 
      
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // วาดภาพวิดีโอลงบน Canvas
      canvasCtx.drawImage(
          results.image, 0, 0, canvasElement.width, canvasElement.height);
          
      // ถ้าระบุตำแหน่งมือได้ (วาดจุดและเส้น)
      if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
                         {color: '#00FF00', lineWidth: 4}); // สีเขียวสำหรับเส้น
          drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2}); // สีแดงสำหรับจุดข้อต่อ
        }
      }
      canvasCtx.restore();
    }

    // ตั้งค่า MediaPipe Hands
    const hands = new Hands({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});
    
    hands.setOptions({
      maxNumHands: 2, // จับมือได้สูงสุด 2 ข้าง
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    hands.onResults(onResults);

    // เปิดกล้องและส่งเฟรมภาพไปให้ AI ประมวลผล
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 640,
      height: 480
    });
    camera.start();
  </script>
</body>
</html>
