<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Solar System 3D — Gesture Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000a18;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
    }

    #canvas-wrap {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* HUD top-left */
    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 12px;
      font-family: 'Courier New', monospace;
      line-height: 2;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }

    #hud .title {
      font-size: 15px;
      font-weight: 600;
      color: #7ec8ff;
      margin-bottom: 2px;
      letter-spacing: 1px;
    }

    /* Planet info card */
    #planet-card {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0, 20, 60, 0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(100, 180, 255, 0.25);
      border-radius: 12px;
      padding: 14px 18px;
      min-width: 160px;
      display: none;
      transition: opacity 0.2s;
    }

    #planet-card .pname {
      font-size: 16px;
      font-weight: 600;
      color: #7ec8ff;
      margin-bottom: 4px;
    }

    #planet-card .ptype {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    #planet-card .pstats {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      line-height: 1.9;
    }

    #planet-card .pstats span {
      color: rgba(255,255,255,0.4);
    }

    #planet-card .close-btn {
      position: absolute;
      top: 8px; right: 10px;
      cursor: pointer;
      font-size: 16px;
      color: rgba(255,255,255,0.4);
      line-height: 1;
    }

    /* Gesture hint bar */
    #hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 7px 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: 0.2px;
    }

    /* Speed controls */
    #controls {
      position: absolute;
      bottom: 64px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    #controls button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #controls button:hover { background: rgba(255,255,255,0.2); }
    #controls button.active { background: rgba(100,180,255,0.25); border-color: rgba(100,180,255,0.5); color: #7ec8ff; }

    /* Gesture ripple feedback */
    .ripple {
      position: absolute;
      border-radius: 50%;
      width: 36px; height: 36px;
      border: 2px solid rgba(100,200,255,0.6);
      transform: translate(-50%, -50%) scale(0);
      animation: ripple-anim 0.4s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }
  </style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="title">🔭 SOLAR SYSTEM 3D</div>
    <div id="hud-zoom">zoom: 1.0×</div>
    <div id="hud-angle">angle: 0°</div>
    <div id="hud-speed">speed: 1×</div>
  </div>

  <div id="planet-card">
    <div class="close-btn" onclick="closePlanetCard()">✕</div>
    <div class="pname" id="pc-name">Earth</div>
    <div class="ptype" id="pc-type">Planet</div>
    <div class="pstats" id="pc-stats"></div>
  </div>

  <div id="controls">
    <button onclick="setSpeed(0)" id="btn-pause">⏸ หยุด</button>
    <button onclick="setSpeed(1)" id="btn-1x" class="active">1×</button>
    <button onclick="setSpeed(3)" id="btn-3x">3×</button>
    <button onclick="setSpeed(10)" id="btn-10x">10×</button>
  </div>

  <div id="hint">
    👆 ปัดเพื่อหมุน &nbsp;|&nbsp; 🤏 สองนิ้วซูม &nbsp;|&nbsp; 🖱 ลาก + scroll &nbsp;|&nbsp; คลิกดาวเพื่อดูข้อมูล
  </div>
</div>

<script>
// ─── Canvas setup ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

function resize() {
  canvas.width  = wrap.clientWidth  * window.devicePixelRatio;
  canvas.height = wrap.clientHeight * window.devicePixelRatio;
}
resize();
window.addEventListener('resize', resize);

const W = () => wrap.clientWidth;
const H = () => wrap.clientHeight;

// ─── State ───────────────────────────────────────────────────────
let rotY   = 0.3;
let rotX   = -0.28;
let zoom   = 1;
let velY   = 0;
let velX   = 0;
let time   = 0;
let speed  = 1;

// ─── Planet data ─────────────────────────────────────────────────
const planets = [
  {
    name: 'Sun', type: 'ดาวฤกษ์', r: 30, orbitR: 0,
    color: '#FFD200', glow: '#FF6B00', speed: 0, tilt: 0,
    stats: { 'เส้นผ่าศูนย์กลาง': '1,392,700 km', 'อุณหภูมิผิว': '5,500 °C', 'อายุ': '4.6 พันล้านปี' },
    moons: []
  },
  {
    name: 'Mercury', type: 'ดาวเคราะห์', r: 5, orbitR: 55,
    color: '#b5b5b5', glow: '#777', speed: 4.74, tilt: 0.034,
    stats: { 'เส้นผ่าศูนย์กลาง': '4,879 km', 'ระยะห่างจากดวงอาทิตย์': '57.9 ล้าน km', 'รอบโคจร': '88 วัน' },
    moons: []
  },
  {
    name: 'Venus', type: 'ดาวเคราะห์', r: 9, orbitR: 88,
    color: '#e8cda0', glow: '#c9963c', speed: 3.50, tilt: 3.096,
    stats: { 'เส้นผ่าศูนย์กลาง': '12,104 km', 'อุณหภูมิผิว': '465 °C', 'รอบโคจร': '225 วัน' },
    moons: []
  },
  {
    name: 'Earth', type: 'ดาวเคราะห์', r: 10, orbitR: 122,
    color: '#3a7bd5', glow: '#1a4fa0', speed: 2.98, tilt: 0.408,
    stats: { 'เส้นผ่าศูนย์กลาง': '12,742 km', 'ระยะห่างจากดวงอาทิตย์': '149.6 ล้าน km', 'ดวงจันทร์': '1 ดวง' },
    moons: [{ r: 3, orbitR: 19, color: '#cccccc', glow: '#999', speed: 13.2, name: 'Moon' }]
  },
  {
    name: 'Mars', type: 'ดาวเคราะห์', r: 7, orbitR: 160,
    color: '#c1440e', glow: '#8b2500', speed: 2.41, tilt: 0.436,
    stats: { 'เส้นผ่าศูนย์กลาง': '6,779 km', 'ดวงจันทร์': '2 ดวง', 'รอบโคจร': '687 วัน' },
    moons: [
      { r: 2, orbitR: 14, color: '#aaa', glow: '#777', speed: 20, name: 'Phobos' },
      { r: 1.5, orbitR: 22, color: '#999', glow: '#666', speed: 10, name: 'Deimos' }
    ]
  },
  {
    name: 'Jupiter', type: 'ดาวเคราะห์', r: 23, orbitR: 225,
    color: '#c88b3a', glow: '#a0612a', speed: 1.31, tilt: 0.054,
    stats: { 'เส้นผ่าศูนย์กลาง': '139,820 km', 'ดวงจันทร์': '95 ดวง', 'รอบโคจร': '11.9 ปี' },
    moons: [
      { r: 3, orbitR: 32, color: '#e8d5a3', glow: '#c8b070', speed: 9.0, name: 'Io' },
      { r: 3.5, orbitR: 42, color: '#d4a96a', glow: '#a87840', speed: 6.5, name: 'Europa' },
      { r: 4, orbitR: 54, color: '#b89070', glow: '#906050', speed: 4.5, name: 'Ganymede' }
    ]
  },
  {
    name: 'Saturn', type: 'ดาวเคราะห์ (วงแหวน)', r: 18, orbitR: 295,
    color: '#e4d191', glow: '#b8a850', speed: 0.97, tilt: 0.467,
    ring: true,
    stats: { 'เส้นผ่าศูนย์กลาง': '116,460 km', 'วงแหวน': 'น้ำแข็งและฝุ่น', 'ดวงจันทร์': '146 ดวง' },
    moons: [
      { r: 4, orbitR: 36, color: '#e0cfa0', glow: '#b0a070', speed: 5.0, name: 'Titan' }
    ]
  },
  {
    name: 'Uranus', type: 'ดาวเคราะห์น้ำแข็ง', r: 13, orbitR: 350,
    color: '#7de8e8', glow: '#4cbcbc', speed: 0.68, tilt: 1.706,
    stats: { 'เส้นผ่าศูนย์กลาง': '50,724 km', 'แกนหมุน': 'เอียง 98°', 'รอบโคจร': '84 ปี' },
    moons: [
      { r: 2.5, orbitR: 26, color: '#aae8e8', glow: '#70c0c0', speed: 7.0, name: 'Titania' }
    ]
  },
  {
    name: 'Neptune', type: 'ดาวเคราะห์น้ำแข็ง', r: 12, orbitR: 405,
    color: '#3f54ba', glow: '#2a3a8c', speed: 0.54, tilt: 0.494,
    stats: { 'เส้นผ่าศูนย์กลาง': '49,244 km', 'ลม': '2,100 km/h', 'รอบโคจร': '165 ปี' },
    moons: [
      { r: 3, orbitR: 25, color: '#8080d0', glow: '#5050a0', speed: -6.0, name: 'Triton' }
    ]
  }
];

// ─── 3D Projection ───────────────────────────────────────────────
function project(x, y, z) {
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  // Rotate around Y
  let rx = x * cosY - z * sinY;
  let rz = x * sinY + z * cosY;
  // Rotate around X
  let ry  = y * cosX - rz * sinX;
  let rz2 = y * sinX + rz * cosX;
  const fov   = 700 * zoom;
  const scale = fov / (fov + rz2 + 300);
  return { sx: W() / 2 + rx * scale, sy: H() / 2 + ry * scale, scale, depth: rz2 };
}

// ─── Stars ───────────────────────────────────────────────────────
const stars = Array.from({ length: 280 }, () => ({
  x: (Math.random() - 0.5) * 1600,
  y: (Math.random() - 0.5) * 1000,
  z: (Math.random() - 0.5) * 1000,
  s: Math.random() * 1.6 + 0.2,
  b: Math.random() * 0.6 + 0.3
}));

function drawStars() {
  stars.forEach(st => {
    const p = project(st.x, st.y, st.z);
    ctx.beginPath();
    ctx.arc(p.sx * window.devicePixelRatio, p.sy * window.devicePixelRatio, st.s * p.scale, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, p.scale * 1.5) * st.b})`;
    ctx.fill();
  });
}

// ─── Draw orbit ──────────────────────────────────────────────────
function drawOrbit(r, dashed = false) {
  const steps = 100;
  ctx.save();
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const a  = (i / steps) * Math.PI * 2;
    const p  = project(Math.cos(a) * r, 0, Math.sin(a) * r);
    i === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth   = 0.7;
  if (dashed) ctx.setLineDash([4, 6]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ─── Draw planet ─────────────────────────────────────────────────
function drawPlanet(planet, angle) {
  const tilt = planet.tilt || 0;
  const x3 = Math.cos(angle) * planet.orbitR;
  const z3 = Math.sin(angle) * planet.orbitR;
  const y3 = Math.sin(angle) * planet.orbitR * Math.sin(tilt) * 0.25;
  const p  = project(x3, y3, z3);
  const dpr = window.devicePixelRatio;
  const px = p.sx * dpr, py = p.sy * dpr;
  const dr = Math.max(planet.r * p.scale * zoom * dpr, 2);

  // Sun glow
  if (planet.name === 'Sun') {
    const g1 = ctx.createRadialGradient(px, py, 0, px, py, dr * 2.8);
    g1.addColorStop(0, 'rgba(255,200,50,0.35)');
    g1.addColorStop(0.5, 'rgba(255,120,0,0.12)');
    g1.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.beginPath();
    ctx.arc(px, py, dr * 2.8, 0, Math.PI * 2);
    ctx.fillStyle = g1;
    ctx.fill();
  }

  // Saturn rings (behind)
  if (planet.ring) {
    ctx.save();
    ctx.translate(px, py);
    ctx.scale(1, 0.28 * dpr);
    const ringColors = [
      [1.45, 'rgba(180,160,100,0.30)', dr * 0.22],
      [1.65, 'rgba(200,175,110,0.22)', dr * 0.20],
      [1.90, 'rgba(160,145,90,0.16)',  dr * 0.22],
    ];
    ringColors.forEach(([ratio, color, lw]) => {
      ctx.beginPath();
      ctx.arc(0, 0, dr * ratio, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth   = lw;
      ctx.stroke();
    });
    ctx.restore();
  }

  // Planet sphere
  const grad = ctx.createRadialGradient(
    px - dr * 0.28, py - dr * 0.28, dr * 0.04,
    px, py, dr
  );
  grad.addColorStop(0, lighten(planet.color, 70));
  grad.addColorStop(0.35, planet.color);
  grad.addColorStop(1, planet.glow || darken(planet.color, 40));
  ctx.beginPath();
  ctx.arc(px, py, dr, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Earth land blobs
  if (planet.name === 'Earth') {
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, dr, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = 'rgba(40,140,40,0.45)';
    ctx.fillRect(px - dr * 0.6, py - dr, dr * 0.55, dr * 2);
    ctx.fillRect(px + dr * 0.1, py - dr * 0.7, dr * 0.5, dr * 1.2);
    ctx.restore();
    // Cloud wisps
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, dr, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(px - dr, py - dr * 0.15, dr * 2, dr * 0.22);
    ctx.restore();
  }

  // Jupiter bands
  if (planet.name === 'Jupiter') {
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, dr, 0, Math.PI * 2);
    ctx.clip();
    const bands = [0.35, 0.15, -0.12, -0.38];
    bands.forEach((off, i) => {
      ctx.fillStyle = i % 2 === 0 ? 'rgba(160,100,50,0.25)' : 'rgba(220,180,120,0.18)';
      ctx.fillRect(px - dr, py + off * dr - dr * 0.12, dr * 2, dr * 0.24);
    });
    ctx.restore();
  }

  // Planet label
  if (zoom > 0.45 && dr > 3 * dpr) {
    ctx.save();
    ctx.scale(1 / dpr, 1 / dpr);
    const fs = Math.max(10, Math.min(14, 11 * p.scale * zoom)) * dpr;
    ctx.font = `${fs}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(planet.name, px, py + dr + 13 * dpr);
    ctx.restore();
  }

  // Draw moons
  planet.moons.forEach((moon, mi) => {
    const ma = time * moon.speed * 0.01 * speed + mi * 2.4;
    const mx3 = x3 + Math.cos(ma) * moon.orbitR;
    const mz3 = z3 + Math.sin(ma) * moon.orbitR;
    const mp  = project(mx3, y3, mz3);
    const mpx = mp.sx * dpr, mpy = mp.sy * dpr;
    const mr  = Math.max(moon.r * mp.scale * zoom * dpr, 1.2);
    const mg  = ctx.createRadialGradient(mpx - mr * 0.2, mpy - mr * 0.2, mr * 0.05, mpx, mpy, mr);
    mg.addColorStop(0, lighten(moon.color, 50));
    mg.addColorStop(1, moon.glow || darken(moon.color, 30));
    ctx.beginPath();
    ctx.arc(mpx, mpy, mr, 0, Math.PI * 2);
    ctx.fillStyle = mg;
    ctx.fill();
  });

  return { sx: p.sx, sy: p.sy, displayR: dr / dpr };
}

// ─── Color helpers ───────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}
function lighten(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

// ─── Main render ─────────────────────────────────────────────────
let planetHits = [];

function draw() {
  const dpr = window.devicePixelRatio;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000a18';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();

  // Depth-sort planets
  const sorted = planets.map((planet, i) => {
    const angle = i === 0 ? 0 : time * planet.speed * 0.002 * speed;
    const x3 = Math.cos(angle) * planet.orbitR;
    const z3 = Math.sin(angle) * planet.orbitR;
    const dep = project(x3, 0, z3).depth;
    return { planet, angle, depth: dep };
  }).sort((a, b) => b.depth - a.depth);

  sorted.forEach(({ planet }) => {
    if (planet.orbitR > 0) drawOrbit(planet.orbitR);
  });

  planetHits = [];
  sorted.forEach(({ planet, angle }) => {
    const pos = drawPlanet(planet, angle);
    planetHits.push({ planet, ...pos });
  });
}

// ─── Animation loop ──────────────────────────────────────────────
function loop() {
  time += 0.5;
  rotY  += velY;
  rotX  += velX;
  rotX   = Math.max(-1.3, Math.min(1.3, rotX));
  velY  *= 0.93;
  velX  *= 0.93;
  draw();
  document.getElementById('hud-zoom').textContent  = `zoom: ${zoom.toFixed(1)}×`;
  document.getElementById('hud-angle').textContent = `angle: ${Math.round((rotY * 180 / Math.PI) % 360)}°`;
  document.getElementById('hud-speed').textContent = `speed: ${speed}×`;
  requestAnimationFrame(loop);
}
loop();

// ─── Gesture: mouse ──────────────────────────────────────────────
let drag = false, lastX = 0, lastY = 0;

wrap.addEventListener('mousedown', e => {
  drag = true; lastX = e.clientX; lastY = e.clientY;
  spawnRipple(e.clientX, e.clientY);
});
window.addEventListener('mouseup',   () => { drag = false; });
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  velY = dx * 0.005; velX = dy * 0.005;
  rotY += dx * 0.005; rotX += dy * 0.005;
  lastX = e.clientX; lastY = e.clientY;
});
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = clampZoom(zoom - e.deltaY * 0.0012);
}, { passive: false });

// ─── Gesture: touch ──────────────────────────────────────────────
let pinchDist = 0;

wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    drag = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    spawnRipple(lastX, lastY);
  } else if (e.touches.length === 2) {
    drag = false;
    pinchDist = getTouchDist(e.touches);
    spawnRipple(
      (e.touches[0].clientX + e.touches[1].clientX) / 2,
      (e.touches[0].clientY + e.touches[1].clientY) / 2
    );
  }
}, { passive: true });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && drag) {
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    velY = dx * 0.006; velX = dy * 0.006;
    rotY += dx * 0.006; rotX += dy * 0.006;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const nd    = getTouchDist(e.touches);
    const delta = nd - pinchDist;
    zoom = clampZoom(zoom + delta * 0.007);
    pinchDist = nd;
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  if (e.touches.length === 0) drag = false;
});

function getTouchDist(touches) {
  return Math.hypot(
    touches[0].clientX - touches[1].clientX,
    touches[0].clientY - touches[1].clientY
  );
}
function clampZoom(z) { return Math.max(0.25, Math.min(5, z)); }

// ─── Click: planet info ──────────────────────────────────────────
wrap.addEventListener('click', e => {
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let hit = null;
  for (const pos of planetHits) {
    if (Math.hypot(mx - pos.sx, my - pos.sy) < pos.displayR + 10) {
      hit = pos.planet; break;
    }
  }
  if (hit) showPlanetCard(hit);
});

function showPlanetCard(p) {
  document.getElementById('pc-name').textContent  = p.name;
  document.getElementById('pc-type').textContent  = p.type;
  const stats = p.stats || {};
  document.getElementById('pc-stats').innerHTML   =
    Object.entries(stats)
      .map(([k,v]) => `<span>${k}:</span> ${v}`)
      .join('<br>');
  document.getElementById('planet-card').style.display = 'block';
}
function closePlanetCard() {
  document.getElementById('planet-card').style.display = 'none';
}

// ─── Speed buttons ───────────────────────────────────────────────
function setSpeed(s) {
  speed = s;
  ['btn-pause','btn-1x','btn-3x','btn-10x'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  const map = { 0: 'btn-pause', 1: 'btn-1x', 3: 'btn-3x', 10: 'btn-10x' };
  if (map[s]) document.getElementById(map[s]).classList.add('active');
}

// ─── Ripple visual feedback ───────────────────────────────────────
function spawnRipple(x, y) {
  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 450);
}
</script>
